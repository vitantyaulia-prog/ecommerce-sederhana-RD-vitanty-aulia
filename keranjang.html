<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Keranjang Belanja</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    text-align: center;
}

/* Header */
header {
    background-color: #333;
    color: white;
    padding: 15px;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

/* Item */
.container {
    margin-top: 20px;
}

.item {
    width: 300px;
    margin: 10px auto;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 10px;
    text-align: left;
}

/* Total */
.total {
    font-size: 20px;
    margin-top: 20px;
}

/* Button */
button {
    margin: 10px;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.hapus {
    background-color: red;
    color: white;
}

.checkout {
    background-color: green;
    color: white;
}

/* Footer */
footer {
    background-color: rgba(128,128,128,0.5);
    position: fixed;
    bottom: 0;
    width: 100%;
    padding: 10px;
}
</style>
</head>

<body>

<header>
    <h2>Toko Vitanty Aulia</h2>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="produk.html">Produk</a>
            <a href="kategori.html">Kategori</a>
            <a href="keranjang.html">Keranjang</a>
        </nav>
</header>

<h2>Keranjang Belanja 🛒</h2>

<div class="container" id="listKeranjang"></div>

<div class="total" id="totalHarga"></div>

<button class="hapus" onclick="hapusSemua()">Hapus Semua</button>
<button class="checkout" onclick="checkout()">Checkout</button>

<footer>
    <p>copyright by vitanty aulia</p>
</footer>

<script>
let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];
let total = 0;
let tampil = "";

if (keranjang.length === 0) {
    tampil = "<p>Keranjang masih kosong 😢</p>";
} else {
    keranjang.forEach((item, index) => {
        tampil += `
        <div class="item">
            <h4>${item.nama}</h4>
            <p>Harga: Rp ${item.harga}</p>
        </div>
        `;
        total += item.harga;
    });
}

document.getElementById("listKeranjang").innerHTML = tampil;
document.getElementById("totalHarga").innerHTML = "Total: Rp " + total;

function hapusSemua() {
    localStorage.removeItem("keranjang");
    location.reload();
}

function checkout() {
    alert("Terima kasih sudah berbelanja 😍");
    localStorage.removeItem("keranjang");
    location.reload();
}
</script>

</body>
</html>
