<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang Belanja</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap');

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: #faf6f1; }
    ::-webkit-scrollbar-thumb { background: rgba(196, 93, 44, 0.18); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(196, 93, 44, 0.32); }

    /* ===== Selection ===== */
    ::selection { background: rgba(196, 93, 44, 0.16); color: #2c1810; }

    body {
        font-family: 'DM Sans', Arial, sans-serif;
        margin: 0;
        text-align: center;
        background: #faf6f1;
        color: #2c1810;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
        padding-bottom: 60px;
        opacity: 0;
        animation: pageIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px;
        background-color: #faf6f1;
    }

    @keyframes pageIn {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .fade-out {
        opacity: 0 !important;
        transition: opacity 0.5s ease !important;
        animation: none !important;
    }

    /* Blob dekorasi */
    body::before {
        content: '';
        position: fixed;
        top: -12%;
        right: -6%;
        width: 460px;
        height: 460px;
        background: radial-gradient(circle, rgba(196, 93, 44, 0.11), transparent 70%);
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
        pointer-events: none;
        animation: blobFloat 22s ease-in-out infinite;
    }

    body::after {
        content: '';
        position: fixed;
        bottom: -8%;
        left: -6%;
        width: 380px;
        height: 380px;
        background: radial-gradient(circle, rgba(122, 158, 126, 0.13), transparent 70%);
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
        pointer-events: none;
        animation: blobFloat 22s ease-in-out infinite -8s;
    }

    @keyframes blobFloat {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(25px, -18px) scale(1.04); }
        50% { transform: translate(-18px, 25px) scale(0.96); }
        75% { transform: translate(12px, 12px) scale(1.02); }
    }

    /* ===== HEADER ===== */
    header {
        background: rgba(250, 246, 241, 0.78);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border-bottom: 1px solid rgba(196, 93, 44, 0.1);
        color: #2c1810;
        padding: 18px 24px;
        position: sticky;
        top: 0;
        z-index: 10;
        animation: headerSlide 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    @keyframes headerSlide {
        from { opacity: 0; transform: translateY(-18px); }
        to { opacity: 1; transform: translateY(0); }
    }

    header h2 {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        font-size: 1.4rem;
        color: #2c1810;
        letter-spacing: -0.02em;
        margin: 0 0 10px 0;
    }

    nav a {
        color: #5a3e2b;
        margin: 0 6px;
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: 500;
        padding: 7px 16px;
        border-radius: 999px;
        transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        position: relative;
    }

    nav a:hover {
        text-decoration: none;
        color: #c45d2c;
        background: rgba(196, 93, 44, 0.08);
    }

    /* ===== JUDUL HALAMAN ===== */
    body > h2 {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        color: #2c1810;
        letter-spacing: -0.03em;
        margin-top: 40px;
        margin-bottom: 8px;
        position: relative;
        z-index: 1;
        animation: heroIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
    }

    body > h2::after {
        content: '';
        display: block;
        width: 50px;
        height: 3px;
        background: linear-gradient(90deg, #c45d2c, #e8743a);
        border-radius: 999px;
        margin: 10px auto 0;
    }

    @keyframes heroIn {
        from { opacity: 0; transform: translateY(25px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* ===== CONTAINER ===== */
    .container {
        margin-top: 24px;
        position: relative;
        z-index: 1;
        animation: heroIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
    }

    /* Empty state styling */
    .container > p {
        font-size: 1rem;
        color: #9c8272;
        padding: 60px 20px;
        position: relative;
    }

    .container > p::before {
        content: '';
        display: block;
        width: 80px;
        height: 80px;
        margin: 0 auto 18px;
        background: rgba(196, 93, 44, 0.06);
        border-radius: 50%;
        position: relative;
    }

    .container > p::after {
        content: '🛒';
        position: absolute;
        top: 52px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 2rem;
        opacity: 0.4;
    }

    /* ===== ITEM ===== */
    .item {
        width: 320px;
        max-width: 90vw;
        margin: 12px auto;
        padding: 18px 20px;
        border: 1px solid rgba(196, 93, 44, 0.1);
        border-radius: 18px;
        text-align: left;
        background: rgba(255, 249, 245, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 2px 12px rgba(44, 24, 16, 0.05);
        transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        position: relative;
        overflow: hidden;
        animation: itemSlide 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Accent bar kiri */
    .item::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: linear-gradient(180deg, #c45d2c, #e8743a);
        border-radius: 0 4px 4px 0;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .item:hover::before { opacity: 1; }

    .item:hover {
        transform: translateX(4px);
        box-shadow: 0 8px 32px rgba(44, 24, 16, 0.1);
        border-color: rgba(196, 93, 44, 0.18);
    }

    .item h4 {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 1rem;
        color: #2c1810;
        margin: 0 0 6px 0;
        letter-spacing: -0.01em;
        transition: color 0.3s;
    }

    .item:hover h4 { color: #c45d2c; }

    .item p {
        font-size: 0.88rem;
        color: #9c8272;
        margin: 0;
        font-weight: 500;
    }

    .item p + p {
        font-weight: 700;
        color: #c45d2c;
        font-size: 0.95rem;
        margin-top: 6px;
    }

    /* Staggered entrance — bantu dengan nth-child */
    .item:nth-child(1) { animation-delay: 0.55s; }
    .item:nth-child(2) { animation-delay: 0.62s; }
    .item:nth-child(3) { animation-delay: 0.69s; }
    .item:nth-child(4) { animation-delay: 0.76s; }
    .item:nth-child(5) { animation-delay: 0.83s; }
    .item:nth-child(6) { animation-delay: 0.90s; }
    .item:nth-child(7) { animation-delay: 0.97s; }
    .item:nth-child(8) { animation-delay: 1.04s; }

    @keyframes itemSlide {
        from { opacity: 0; transform: translateY(16px) translateX(-8px); }
        to { opacity: 1; transform: translateY(0) translateX(0); }
    }

    /* ===== TOTAL ===== */
    .total {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        font-size: 1.4rem;
        color: #2c1810;
        margin-top: 32px;
        position: relative;
        z-index: 1;
        animation: heroIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.65s both;
    }

    /* Highlight pada kata "Total:" */
    .total::before {
        content: 'Total';
        font-weight: 900;
        color: #c45d2c;
        background: linear-gradient(135deg, #fceee6, #fceee6);
        padding: 2px 12px 0;
        border-radius: 8px 8px 0 0;
        display: inline;
        font-size: 0.85rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-right: 4px;
    }

    .total::after {
        content: '';
        display: block;
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, #c45d2c, #e8743a);
        border-radius: 999px;
        margin: 10px auto 0;
    }

    /* ===== BUTTONS ===== */
    button {
        margin: 10px;
        padding: 12px 28px;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-family: 'DM Sans', Arial, sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        position: relative;
        z-index: 1;
        animation: heroIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.75s both;
    }

    button:focus-visible {
        outline: 2px solid #c45d2c;
        outline-offset: 3px;
    }

    .hapus {
        background: linear-gradient(135deg, #c0392b, #e74c3c);
        color: white;
        box-shadow: 0 4px 18px rgba(192, 57, 43, 0.2);
    }

    .hapus:hover {
        transform: translateY(-2px) scale(1.04);
        box-shadow: 0 10px 32px rgba(192, 57, 43, 0.3);
    }

    .hapus:active { transform: translateY(0) scale(0.97); }

    .checkout {
        background: linear-gradient(135deg, #7a9e7e, #96b89a);
        color: white;
        box-shadow: 0 4px 18px rgba(122, 158, 126, 0.25);
    }

    .checkout:hover {
        transform: translateY(-2px) scale(1.04);
        box-shadow: 0 10px 32px rgba(122, 158, 126, 0.35);
    }

    .checkout:active { transform: translateY(0) scale(0.97); }

    /* ===== FOOTER ===== */
    footer {
        background: rgba(250, 246, 241, 0.82);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border-top: 1px solid rgba(196, 93, 44, 0.1);
        color: #9c8272;
        position: fixed;
        bottom: 0;
        width: 100%;
        padding: 14px 10px;
        font-size: 0.82rem;
        font-weight: 500;
        z-index: 10;
    }

    footer::before {
        content: '';
        position: absolute;
        top: -16px;
        left: 50%;
        transform: translateX(-50%);
        width: 240px;
        height: 16px;
        background: radial-gradient(ellipse, rgba(196, 93, 44, 0.05), transparent);
        pointer-events: none;
    }

    /* ===== RESPONSIVE HP (sudah ada, tetap dipertahankan) ===== */
    @media (max-width: 640px) {
        header { padding: 14px 16px; }
        header h2 { font-size: 1.2rem; }
        nav a { padding: 6px 12px; font-size: 0.8rem; margin: 0 2px; }
        body > h2 { font-size: 1.5rem; margin-top: 28px; }
        .item { width: 90vw; padding: 16px; }
        .total { font-size: 1.2rem; }
        button { padding: 11px 22px; font-size: 0.85rem; margin: 8px 6px; }
    }

    /* ===== RESPONSIVE TABLET (641px ke atas) ===== */
    @media (min-width: 641px) {
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 740px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 24px;
            margin-top: 24px;
        }

        .container > p {
            grid-column: 1 / -1;
            font-size: 1.05rem;
            padding: 80px 20px;
        }

        .item {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 20px 22px;
        }

        .item h4 { font-size: 1.05rem; }
        .item p { font-size: 0.9rem; }
        .item p + p { font-size: 1rem; }

        .item:hover {
            transform: translateY(-3px);
        }

        .total {
            max-width: 740px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 24px;
            text-align: left;
        }

        /* Fix: garis bawah total ikut rata kiri di tablet */
        .total::after {
            margin: 10px 0 0;
        }
    }

    /* ===== RESPONSIVE LAPTOP / DESKTOP (1024px ke atas) ===== */
    @media (min-width: 1024px) {
        .container {
            grid-template-columns: repeat(3, 1fr);
            max-width: 1100px;
            gap: 20px;
            padding: 0 32px;
        }

        .container > p {
            grid-column: 1 / -1;
            font-size: 1.1rem;
            padding: 100px 20px;
        }

        .item {
            padding: 22px 24px;
        }

        .item h4 { font-size: 1.1rem; }

        .item:hover {
            transform: translateY(-4px) translateX(0);
            box-shadow: 0 12px 40px rgba(44, 24, 16, 0.12);
        }

        .total {
            max-width: 1100px;
            padding: 0 32px;
            font-size: 1.6rem;
        }

        /* Fix: garis bawah total tetap rata kiri di laptop */
        .total::after {
            margin: 10px 0 0;
            width: 70px;
        }

        header {
            padding: 20px 32px;
        }

        header h2 {
            font-size: 1.6rem;
        }

        nav a {
            font-size: 0.95rem;
            padding: 8px 22px;
            margin: 0 8px;
        }

        body > h2 {
            font-size: 2.4rem;
            margin-top: 48px;
        }

        button {
            padding: 14px 36px;
            font-size: 0.95rem;
            margin: 12px;
        }

        footer {
            font-size: 0.88rem;
            padding: 16px 10px;
        }
    }

    /* ===== RESPONSIVE DESKTOP BESAR (1440px ke atas) ===== */
    @media (min-width: 1440px) {
        .container {
            max-width: 1300px;
            gap: 24px;
        }

        .item {
            padding: 24px 28px;
            border-radius: 20px;
        }

        .item h4 { font-size: 1.15rem; }

        .total {
            max-width: 1300px;
            font-size: 1.8rem;
        }

        /* Fix: garis bawah total tetap rata kiri di desktop besar */
        .total::after {
            margin: 10px 0 0;
            width: 80px;
        }

        header {
            padding: 22px 48px;
        }

        header h2 { font-size: 1.7rem; }

        nav a {
            font-size: 1rem;
            padding: 9px 26px;
            margin: 0 10px;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation-duration: 0.01ms !important;
            transition-duration: 0.01ms !important;
        }
    }

    /* ====================================================
       TAMBAHAN: STYLES BAGIAN KONTAK
       ==================================================== */
    .kontak-section {
        position: relative;
        z-index: 1;
        margin-top: 36px;
        padding: 0 20px 28px;
        opacity: 0;
        animation: heroIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.85s both;
    }

    .kontak-label {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: clamp(0.9rem, 2.2vw, 1.1rem);
        color: #5a3e2b;
        margin-bottom: 16px;
        letter-spacing: -0.01em;
    }

    .kontak-label::after {
        content: '';
        display: block;
        width: 28px;
        height: 2px;
        background: linear-gradient(90deg, #c45d2c, #e8743a);
        border-radius: 999px;
        margin: 8px auto 0;
    }

    .kontak-list {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 12px;
        flex-wrap: wrap;
        max-width: 520px;
        margin: 0 auto;
    }

    .kontak-item {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(12px) saturate(1.3);
        -webkit-backdrop-filter: blur(12px) saturate(1.3);
        border: 1px solid rgba(196, 93, 44, 0.08);
        border-radius: 13px;
        padding: 10px 15px;
        text-decoration: none;
        color: #5a3e2b;
        font-size: clamp(0.74rem, 1.6vw, 0.84rem);
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        min-width: 0;
    }

    .kontak-item:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(196, 93, 44, 0.1);
        border-color: rgba(196, 93, 44, 0.2);
        color: #c45d2c;
        background: rgba(255, 255, 255, 0.72);
    }

    .kontak-item:focus-visible {
        outline: 2px solid #c45d2c;
        outline-offset: 2px;
    }

    .kontak-icon {
        flex-shrink: 0;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .kontak-icon svg {
        width: 16px;
        height: 16px;
    }

    .kontak-item.wa .kontak-icon {
        background: rgba(37, 211, 102, 0.1);
    }
    .kontak-item.wa .kontak-icon svg { stroke: #25D366; }

    .kontak-item.gmail .kontak-icon {
        background: rgba(234, 67, 53, 0.07);
    }
    .kontak-item.gmail .kontak-icon svg { stroke: #EA4335; }

    .kontak-item.ig .kontak-icon {
        background: rgba(225, 48, 108, 0.07);
    }
    .kontak-item.ig .kontak-icon svg { stroke: #E1306C; }

    .kontak-text {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 1px;
        min-width: 0;
    }

    .kontak-text span:first-child {
        font-size: 0.6rem;
        color: #9c8272;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    .kontak-text span:last-child {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 120px;
    }

    .kontak-item:hover .kontak-text span:last-child {
        color: #c45d2c;
    }

    @media (max-width: 640px) {
        .kontak-section { margin-top: 28px; padding: 0 14px 22px; }

        .kontak-list {
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .kontak-item {
            width: 100%;
            max-width: 260px;
            justify-content: center;
            padding: 9px 13px;
        }

        .kontak-text {
            align-items: center;
        }

        .kontak-text span:last-child {
            max-width: 150px;
        }
    }

    @media (min-width: 1024px) {
        .kontak-section { margin-top: 44px; }
        .kontak-list { gap: 16px; }
        .kontak-item { padding: 12px 18px; }
        .kontak-text span:last-child { max-width: 135px; }
    }

    /* ====================================================
       TAMBAHAN: TOAST NOTIFIKASI
       ==================================================== */
    .toast {
        position: fixed;
        bottom: 70px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: rgba(44, 24, 16, 0.88);
        color: #faf6f1;
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 0.84rem;
        font-weight: 600;
        font-family: 'DM Sans', Arial, sans-serif;
        z-index: 20;
        pointer-events: none;
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 8px 32px rgba(44, 24, 16, 0.25);
        white-space: nowrap;
    }

    .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    /* ====================================================
       TAMBAHAN: MODAL KONFIRMASI CHECKOUT
       ==================================================== */
    .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(44, 24, 16, 0.3);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        z-index: 15;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
    }

    .modal-overlay.show {
        opacity: 1;
        pointer-events: auto;
    }

    .modal-box {
        background: rgba(255, 249, 245, 0.92);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border: 1px solid rgba(196, 93, 44, 0.12);
        border-radius: 22px;
        padding: 32px 28px 26px;
        max-width: 380px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(44, 24, 16, 0.18);
        transform: scale(0.92) translateY(12px);
        transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .modal-overlay.show .modal-box {
        transform: scale(1) translateY(0);
    }

    .modal-box h3 {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        font-size: 1.2rem;
        color: #2c1810;
        margin: 0 0 6px;
        letter-spacing: -0.02em;
    }

    .modal-box .modal-sub {
        font-size: 0.82rem;
        color: #9c8272;
        margin: 0 0 18px;
        line-height: 1.5;
    }

    .modal-ringkasan {

<!-- ===== TAMBAHAN: TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];
let total = 0;
let tampil = "";

if (keranjang.length === 0) {
    tampil = "<p>Keranjang masih kosong 😢</p>";
} else {
    keranjang.forEach((item, index) => {
        tampil += `
        <div class="item">
            <h4>${item.nama}</h4>
            <p>Harga: Rp ${item.harga}</p>
        </div>
        `;
        total += item.harga;
    });
}

document.getElementById("listKeranjang").innerHTML = tampil;
document.getElementById("totalHarga").innerHTML = "Total: Rp " + total;

function hapusSemua() {
    localStorage.removeItem("keranjang");
    location.reload();
}

function tampilToast(pesan) {
    let toast = document.getElementById("toast");
    toast.textContent = pesan;
    toast.classList.add("show");
    setTimeout(function() {
        toast.classList.remove("show");
    }, 2200);
}

function checkout() {
    if (keranjang.length === 0) {
        tampilToast("Keranjang masih kosong 😢");
        return;
    }

    /* Bangun ringkasan pesanan untuk ditampilkan di modal */
    let ringkasan = "";
    keranjang.forEach(function(item) {
        ringkasan += "<p>" + item.nama + " — Rp " + item.harga.toLocaleString("id-ID") + "</p>";
    });
    ringkasan += "<p>Total: Rp " + total.toLocaleString("id-ID") + "</p>";

    document.getElementById("modalRingkasan").innerHTML = ringkasan;
    document.getElementById("modalCheckout").classList.add("show");
}

function tutupModal() {
    document.getElementById("modalCheckout").classList.remove("show");
}

function kirimWA() {
    /* Bangun pesan yang rapi untuk WhatsApp */
    let pesan = "Halo kak, saya mau pesan:\n\n";
    keranjang.forEach(function(item, i) {
        pesan += (i + 1) + ". " + item.nama + " — Rp " + item.harga.toLocaleString("id-ID") + "\n";
    });
    pesan += "\nTotal: Rp " + total.toLocaleString("id-ID");
    pesan += "\n\nTerima kasih 🙏";

    /* Encode & buka WhatsApp */
    let waUrl = "https://wa.me/62895412066120?text=" + encodeURIComponent(pesan);

    /* Hapus keranjang setelah pesan dikirim */
    localStorage.removeItem("keranjang");

    /* Tutup modal lalu redirect ke WA */
    document.getElementById("modalCheckout").classList.remove("show");
    tampilToast("Pesanan dikirim via WhatsApp ✅");

    setTimeout(function() {
        window.open(waUrl, "_blank");
        location.reload();
    }, 800);
}

/* Tutup modal kalau klik area gelap di luar kotak */
document.getElementById("modalCheckout").addEventListener("click", function(e) {
    if (e.target === this) {
        tutupModal();
    }
});
</script>
