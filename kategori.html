<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kategori Produk</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* Header */
header {
    background-color: #333;
    color: white;
    padding: 15px;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

/* Kategori */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: wrap;
}

.kategori {
    width: 200px;
    padding: 20px;
    border-radius: 10px;
    background-color: #f5f5f5;
    cursor: pointer;
    transition: 0.3s;
}

.kategori:hover {
    transform: scale(1.1);
    background-color: #ffe4e1;
}
</style>
</head>

<body>

<header>
    <h2>Toko Vitanty Aulia</h2>
    <nav>
        <a href="index.html">Beranda</a>
        <a href="produk.html">Produk</a>
        <a href="kategori.html">Kategori</a>
        <a href="keranjang.html">Keranjang</a>
    </nav>
</header>

<h2>Pilih Kategori 🛍️</h2>

<div class="container">

    <div class="kategori" onclick="pindahKategori('dimsum')">
        <h3>🥟 Dimsum</h3>
        <p>Aneka dimsum lezat</p>
    </div>

    <div class="kategori" onclick="pindahKategori('cemilan')">
        <h3>🍢 Cemilan</h3>
        <p>Snack dan gorengan</p>
    </div>

</div>

<script>
function pindahKategori(kategori) {
    localStorage.setItem("kategori", kategori);
    window.location.href = "produk.html";
}
</script>

</body>
</html>
