<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kategori Produk</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap');

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: #faf6f1; }
    ::-webkit-scrollbar-thumb { background: rgba(196, 93, 44, 0.18); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(196, 93, 44, 0.32); }

    /* ===== Selection ===== */
    ::selection { background: rgba(196, 93, 44, 0.16); color: #2c1810; }

    body {
        margin: 0;
        font-family: 'DM Sans', Arial, sans-serif;
        text-align: center;
        background: #faf6f1;
        color: #2c1810;
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        opacity: 0;
        animation: pageIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px;
        background-color: #faf6f1;
    }

    @keyframes pageIn {
        from { opacity: 0; transform: translateY(18px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .fade-out {
        opacity: 0 !important;
        transition: opacity 0.5s ease !important;
        animation: none !important;
    }

    /* Blob dekorasi */
    body::before {
        content: '';
        position: fixed;
        top: -12%;
        right: -6%;
        width: 460px;
        height: 460px;
        background: radial-gradient(circle, rgba(196, 93, 44, 0.11), transparent 70%);
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
        pointer-events: none;
        animation: blobFloat 22s ease-in-out infinite;
    }

    body::after {
        content: '';
        position: fixed;
        bottom: -8%;
        left: -6%;
        width: 380px;
        height: 380px;
        background: radial-gradient(circle, rgba(122, 158, 126, 0.13), transparent 70%);
        border-radius: 50%;
        filter: blur(80px);
        z-index: 0;
        pointer-events: none;
        animation: blobFloat 22s ease-in-out infinite -8s;
    }

    @keyframes blobFloat {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(25px, -18px) scale(1.04); }
        50% { transform: translate(-18px, 25px) scale(0.96); }
        75% { transform: translate(12px, 12px) scale(1.02); }
    }

    /* ===== HEADER ===== */
    header {
        background: rgba(250, 246, 241, 0.78);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border-bottom: 1px solid rgba(196, 93, 44, 0.1);
        color: #2c1810;
        padding: 18px 24px;
        position: sticky;
        top: 0;
        z-index: 10;
        animation: headerSlide 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    @keyframes headerSlide {
        from { opacity: 0; transform: translateY(-18px); }
        to { opacity: 1; transform: translateY(0); }
    }

    header h2 {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        font-size: 1.4rem;
        color: #2c1810;
        letter-spacing: -0.02em;
        margin: 0 0 10px 0;
    }

    nav a {
        color: #5a3e2b;
        margin: 0 6px;
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: 500;
        padding: 7px 16px;
        border-radius: 999px;
        transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        position: relative;
    }

    nav a:hover {
        text-decoration: none;
        color: #c45d2c;
        background: rgba(196, 93, 44, 0.08);
    }

    /* ===== JUDUL HALAMAN ===== */
    body > h2 {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        color: #2c1810;
        letter-spacing: -0.03em;
        margin-top: 48px;
        margin-bottom: 8px;
        position: relative;
        z-index: 1;
        animation: heroIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
    }

    body > h2::after {
        content: '';
        display: block;
        width: 50px;
        height: 3px;
        background: linear-gradient(90deg, #c45d2c, #e8743a);
        border-radius: 999px;
        margin: 10px auto 0;
    }

    @keyframes heroIn {
        from { opacity: 0; transform: translateY(25px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* ===== KATEGORI ===== */
    .container {
        display: flex;
        justify-content: center;
        gap: 24px;
        margin-top: 36px;
        flex-wrap: wrap;
        padding: 0 20px;
        position: relative;
        z-index: 1;
        animation: heroIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
    }

    .kategori {
        width: 220px;
        padding: 28px 20px;
        border-radius: 20px;
        background: rgba(255, 249, 245, 0.7);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(196, 93, 44, 0.1);
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        position: relative;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(44, 24, 16, 0.04);
    }

    .kategori:nth-child(1) { animation: cardPop 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.55s both; }
    .kategori:nth-child(2) { animation: cardPop 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.68s both; }
    .kategori:nth-child(3) { animation: cardPop 0.65s cubic-bezier(0.22, 1, 0.36, 1) 0.81s both; }

    @keyframes cardPop {
        from { opacity: 0; transform: translateY(28px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .kategori::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, #c45d2c, transparent);
        opacity: 0;
        transition: opacity 0.4s;
        z-index: 2;
    }

    .kategori::after {
        content: '';
        position: absolute;
        top: -25px;
        right: -25px;
        width: 80px;
        height: 80px;
        background: radial-gradient(circle, rgba(196, 93, 44, 0.06), transparent 70%);
        border-radius: 50%;
        pointer-events: none;
        transition: all 0.5s;
    }

    .kategori:hover {
        transform: translateY(-8px) scale(1.04);
        background: rgba(252, 238, 230, 0.85);
        box-shadow: 0 16px 48px rgba(44, 24, 16, 0.1);
        border-color: rgba(196, 93, 44, 0.2);
    }

    .kategori:hover::before { opacity: 1; }

    .kategori:hover::after {
        width: 120px;
        height: 120px;
        background: radial-gradient(circle, rgba(196, 93, 44, 0.1), transparent 70%);
    }

    .kategori h3 {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 1.15rem;
        color: #2c1810;
        margin: 0 0 10px 0;
        letter-spacing: -0.01em;
        transition: color 0.3s;
        position: relative;
        z-index: 1;
    }

    .kategori:hover h3 { color: #c45d2c; }

    .kategori p {
        font-size: 0.82rem;
        color: #9c8272;
        margin: 0;
        line-height: 1.5;
        position: relative;
        z-index: 1;
    }

    .kategori:active::after {
        content: '';
        position: absolute;
        inset: 0;
        border: 2px solid rgba(196, 93, 44, 0.15);
        border-radius: inherit;
        animation: ringPulse 0.5s ease-out;
    }

    @keyframes ringPulse {
        0% { opacity: 0.5; transform: scale(1); }
        100% { opacity: 0; transform: scale(1.06); }
    }

    /* ===== FOOTER ===== */
    footer {
        background: rgba(250, 246, 241, 0.82);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border-top: 1px solid rgba(196, 93, 44, 0.1);
        color: #9c8272;
        width: 100%;
        padding: 18px 10px;
        font-size: 0.82rem;
        font-weight: 500;
        z-index: 1;
        margin-top: auto;
    }

    footer::before {
        content: '';
        position: absolute;
        top: -16px;
        left: 50%;
        transform: translateX(-50%);
        width: 240px;
        height: 16px;
        background: radial-gradient(ellipse, rgba(196, 93, 44, 0.05), transparent);
        pointer-events: none;
    }

    /* ===== RESPONSIVE HP (sudah ada, tetap dipertahankan) ===== */
    @media (max-width: 640px) {
        header { padding: 14px 16px; }
        header h2 { font-size: 1.2rem; }
        nav a { padding: 6px 12px; font-size: 0.8rem; margin: 0 2px; }
        body > h2 { font-size: 1.5rem; margin-top: 32px; }
        .container { gap: 16px; margin-top: 28px; }
        .kategori { width: calc(50% - 16px); min-width: 150px; padding: 22px 16px; }
    }

    /* ===== RESPONSIVE TABLET (641px ke atas) ===== */
    @media (min-width: 641px) {
        .container {
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
            gap: 28px;
            padding: 0 24px;
            margin-top: 40px;
        }

        .kategori {
            width: calc(50% - 14px);
            min-width: 0;
            padding: 32px 24px;
            border-radius: 22px;
        }

        .kategori h3 {
            font-size: 1.25rem;
            margin-bottom: 12px;
        }

        .kategori p {
            font-size: 0.88rem;
        }

        .kategori:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 56px rgba(44, 24, 16, 0.12);
        }

        body > h2 {
            margin-top: 56px;
        }
    }

    /* ===== RESPONSIVE LAPTOP / DESKTOP (1024px ke atas) ===== */
    @media (min-width: 1024px) {
        .container {
            max-width: 860px;
            gap: 36px;
            padding: 0 32px;
            margin-top: 48px;
        }

        .kategori {
            width: calc(50% - 18px);
            padding: 40px 32px;
            border-radius: 24px;
        }

        .kategori h3 {
            font-size: 1.4rem;
            margin-bottom: 14px;
        }

        .kategori p {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .kategori:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 24px 64px rgba(44, 24, 16, 0.14);
        }

        .kategori:hover::after {
            width: 150px;
            height: 150px;
        }

        header {
            padding: 22px 40px;
        }

        header h2 {
            font-size: 1.6rem;
        }

        nav a {
            font-size: 0.95rem;
            padding: 9px 24px;
            margin: 0 10px;
        }

        body > h2 {
            font-size: 2.4rem;
            margin-top: 64px;
            margin-bottom: 12px;
        }

        body > h2::after {
            width: 60px;
            height: 3px;
        }

        footer {
            font-size: 0.88rem;
            padding: 20px 10px;
        }
    }

    /* ===== RESPONSIVE DESKTOP BESAR (1440px ke atas) ===== */
    @media (min-width: 1440px) {
        .container {
            max-width: 1000px;
            gap: 44px;
            margin-top: 56px;
        }

        .kategori {
            width: calc(50% - 22px);
            padding: 52px 40px;
            border-radius: 28px;
        }

        .kategori h3 {
            font-size: 1.55rem;
            margin-bottom: 16px;
        }

        .kategori p {
            font-size: 1rem;
        }

        .kategori::before {
            height: 4px;
        }

        .kategori:hover {
            transform: translateY(-14px) scale(1.06);
            box-shadow: 0 28px 72px rgba(44, 24, 16, 0.16);
        }

        header {
            padding: 24px 56px;
        }

        header h2 {
            font-size: 1.75rem;
        }

        nav a {
            font-size: 1rem;
            padding: 10px 28px;
            margin: 0 12px;
        }

        body > h2 {
            font-size: 2.8rem;
            margin-top: 72px;
        }

        body > h2::after {
            width: 70px;
        }

        footer {
            font-size: 0.92rem;
            padding: 22px 10px;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
            animation-duration: 0.01ms !important;
            transition-duration: 0.01ms !important;
        }
    }

    /* ====================================================
       TAMBAHAN: STYLES BAGIAN KONTAK
       ==================================================== */
    .kontak-section {
        position: relative;
        z-index: 1;
        margin-top: 48px;
        padding: 0 20px 32px;
        opacity: 0;
        animation: heroIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.9s both;
    }

    .kontak-label {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: clamp(0.9rem, 2.2vw, 1.1rem);
        color: #5a3e2b;
        margin-bottom: 18px;
        letter-spacing: -0.01em;
    }

    .kontak-label::after {
        content: '';
        display: block;
        width: 28px;
        height: 2px;
        background: linear-gradient(90deg, #c45d2c, #e8743a);
        border-radius: 999px;
        margin: 9px auto 0;
    }

    .kontak-list {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 14px;
        flex-wrap: wrap;
        max-width: 520px;
        margin: 0 auto;
    }

    .kontak-item {
        display: flex;
        align-items: center;
        gap: 9px;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(12px) saturate(1.3);
        -webkit-backdrop-filter: blur(12px) saturate(1.3);
        border: 1px solid rgba(196, 93, 44, 0.08);
        border-radius: 14px;
        padding: 11px 16px;
        text-decoration: none;
        color: #5a3e2b;
        font-size: clamp(0.74rem, 1.6vw, 0.86rem);
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        min-width: 0;
    }

    .kontak-item:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 26px rgba(196, 93, 44, 0.11);
        border-color: rgba(196, 93, 44, 0.2);
        color: #c45d2c;
        background: rgba(255, 255, 255, 0.72);
    }

    .kontak-item:focus-visible {
        outline: 2px solid #c45d2c;
        outline-offset: 2px;
    }

    .kontak-icon {
        flex-shrink: 0;
        width: 32px;
        height: 32px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .kontak-icon svg {
        width: 17px;
        height: 17px;
    }

    .kontak-item.wa .kontak-icon {
        background: rgba(37, 211, 102, 0.1);
    }
    .kontak-item.wa .kontak-icon svg { stroke: #25D366; }

    .kontak-item.gmail .kontak-icon {
        background: rgba(234, 67, 53, 0.07);
    }
    .kontak-item.gmail .kontak-icon svg { stroke: #EA4335; }

    .kontak-item.ig .kontak-icon {
        background: rgba(225, 48, 108, 0.07);
    }
    .kontak-item.ig .kontak-icon svg { stroke: #E1306C; }

    .kontak-text {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 1px;
        min-width: 0;
    }

    .kontak-text span:first-child {
        font-size: 0.62rem;
        color: #9c8272;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }

    .kontak-text span:last-child {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 120px;
    }

    .kontak-item:hover .kontak-text span:last-child {
        color: #c45d2c;
    }

    @media (max-width: 640px) {
        .kontak-section { margin-top: 36px; padding: 0 14px 26px; }

        .kontak-list {
            flex-direction: column;
            align-items: center;
            gap: 9px;
        }

        .kontak-item {
            width: 100%;
            max-width: 260px;
            justify-content: center;
            padding: 10px 14px;
        }

        .kontak-text {
            align-items: center;
        }

        .kontak-text span:last-child {
            max-width: 150px;
        }
    }

    @media (min-width: 1024px) {
        .kontak-section { margin-top: 56px; }
        .kontak-list { gap: 18px; }
        .kontak-item { padding: 13px 20px; }
        .kontak-text span:last-child { max-width: 135px; }
    }

    @media (min-width: 1440px) {
        .kontak-section { margin-top: 64px; }
        .kontak-item { padding: 14px 22px; }
    }
</style>
</head>
