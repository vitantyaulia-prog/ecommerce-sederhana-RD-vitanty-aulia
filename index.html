<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Website Pertamaku</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap');

        body {
            margin: 0;
            font-family: 'DM Sans', Arial, sans-serif;
            text-align: center;
            min-height: 100vh;
            background: #faf6f1;
            color: #2c1810;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* Dekorasi background dengan pseudo-element (tanpa ubah HTML) */
        body::before {
            content: '';
            position: fixed;
            top: -15%;
            right: -8%;
            width: 520px;
            height: 520px;
            background: radial-gradient(circle, rgba(196, 93, 44, 0.13), transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: blobFloat 22s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            left: -8%;
            width: 440px;
            height: 440px;
            background: radial-gradient(circle, rgba(122, 158, 126, 0.15), transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: blobFloat 22s ease-in-out infinite -8s;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(25px, -18px) scale(1.04); }
            50% { transform: translate(-18px, 25px) scale(0.96); }
            75% { transform: translate(12px, 12px) scale(1.02); }
        }

        /* Header */
        header {
            background: rgba(250, 246, 241, 0.78);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-bottom: 1px solid rgba(196, 93, 44, 0.1);
            padding: 22px 24px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h2 {
            margin: 0 0 12px 0;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: #2c1810;
            letter-spacing: -0.02em;
        }

        nav a {
            color: #5a3e2b;
            margin: 0 10px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 7px 18px;
            border-radius: 999px;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        nav a:hover {
            text-decoration: none;
            color: #c45d2c;
            background: rgba(196, 93, 44, 0.08);
        }

        /* Heading utama */
        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2rem, 5vw, 3.2rem);
            color: #2c1810;
            margin-top: 90px;
            letter-spacing: -0.03em;
            line-height: 1.25;
            position: relative;
            z-index: 1;
            padding: 0 20px;
        }

        /* Garis dekoratif di bawah h1 */
        h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #c45d2c, #e8743a);
            border-radius: 999px;
            margin: 20px auto 0;
        }

        .btn-produk {
            background: linear-gradient(135deg, #c45d2c, #e8743a);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'DM Sans', Arial, sans-serif;
            margin-top: 28px;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 8px 36px rgba(196, 93, 44, 0.22);
            position: relative;
            z-index: 1;
            letter-spacing: 0.01em;
        }

        .btn-produk:hover {
            background: linear-gradient(135deg, #e8743a, #d4683a);
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 14px 48px rgba(196, 93, 44, 0.35);
        }

        /* Animasi halaman — dipertahankan, sedikit diperkaya */
        body {
            opacity: 0;
            animation: fadeIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Footer */
        footer {
            background: rgba(250, 246, 241, 0.82);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-top: 1px solid rgba(196, 93, 44, 0.1);
            color: #9c8272;
            text-align: center;
            padding: 14px 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 0.84rem;
            font-weight: 500;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h2>✨Toko Dapur Aulisious ✨</h2>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="produk.html">Produk</a>
            <a href="kategori.html">Kategori</a>
            <a href="keranjang.html">Keranjang</a>
        </nav>
    </header>

    <h1>Selamat Datang di Dapur Aulisious</h1>

<button onclick="pindahHalaman('produk.html')" class="btn-produk">
    Lihat Produk
</button>

    <footer>
        <p>copyright by vitanty aulia</p>
    </footer>
<script>
function pindahHalaman(url) {
    document.body.classList.add("fade-out");
    setTimeout(function() {
        window.location.href = url;
    }, 500);
}
</script>
</body>
</html>
